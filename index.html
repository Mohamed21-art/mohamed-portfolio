<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mohamed Elsayed — AI-Native Video & Content Director</title>
    <meta name="description" content="AI-native video and content direction for premium Gulf-market brands — from AI-assisted generation through edit and color grade." />

    <!-- Preconnect to Vimeo for faster video modal loads -->
    <link rel="dns-prefetch" href="https://player.vimeo.com" />
    <link rel="preconnect" href="https://player.vimeo.com" crossorigin />

    <!-- Ensure fonts render immediately with swap -->
    <style>
      @font-face {
        font-family: 'Inter';
        font-display: swap;
        src: local('Inter');
      }
    </style>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mohamed Elsayed — AI-Native Video & Content Director" />
    <meta property="og:description" content="AI-native video and content direction for premium Gulf-market brands — from AI-assisted generation through edit and color grade." />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Mohamed Elsayed — AI-Native Video & Content Director" />
    <meta property="twitter:description" content="AI-native video and content direction for premium Gulf-market brands — from AI-assisted generation through edit and color grade." />
  </head>
  <body>
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 'system';
          var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
